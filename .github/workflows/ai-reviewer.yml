name: AI Reviewer

on:
  pull_request:
    types: [labeled]

jobs:
  review:
    # Run when "ai-developed" label is added
    if: github.event.label.name == 'ai-developed'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine AI Provider from issue labels
        id: provider
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check PR body for the linked issue and detect which provider was used
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body')

          # Check if the PR was created with claude by looking at the issue labels
          ISSUE_NUM=$(echo "$PR_BODY" | grep -oP 'Closes #\K\d+' || echo "")

          if [ -n "$ISSUE_NUM" ]; then
            LABELS=$(gh issue view "$ISSUE_NUM" --json labels -q '.labels[].name')
            if echo "$LABELS" | grep -q "ai-task-claude"; then
              echo "ai_provider=claude" >> $GITHUB_OUTPUT
            else
              echo "ai_provider=gemini" >> $GITHUB_OUTPUT
            fi
          else
            echo "ai_provider=gemini" >> $GITHUB_OUTPUT
          fi

      - name: Run AI Reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: ${{ steps.provider.outputs.ai_provider }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: npx tsx src/reviewer.ts
