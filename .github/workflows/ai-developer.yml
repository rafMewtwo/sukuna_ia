name: AI Developer

on:
  issues:
    types: [labeled]

jobs:
  develop:
    # Run when "ai-task-gemini" or "ai-task-claude" label is added
    if: >
      github.event.label.name == 'ai-task-gemini' ||
      github.event.label.name == 'ai-task-claude'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine AI Provider
        id: provider
        run: |
          if [ "${{ github.event.label.name }}" = "ai-task-claude" ]; then
            echo "ai_provider=claude" >> $GITHUB_OUTPUT
          else
            echo "ai_provider=gemini" >> $GITHUB_OUTPUT
          fi

      - name: Run AI Developer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AI_PROVIDER: ${{ steps.provider.outputs.ai_provider }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: npx tsx src/developer.ts
